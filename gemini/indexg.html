<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Personal Dashboard</title>
  <style>
    /* ─── RESET & ROOT SYSTEMS ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark: #0f1319;
      --text-light: #f7f8fa;
      --ink: #11161d;
      --border-alpha: rgba(255, 255, 255, 0.08);
      
      /* Color Blocks Inspired by image_3dca80.jpg */
      --card-lavender: #e2c1eb;
      --card-lime: #ccd42a;
      --card-blue: #00239c;
      --card-glass: rgba(255, 255, 255, 0.06);

      --radius: 24px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body { min-height: 100vh; }

    body {
      font-family: -apple-system, "SF Pro Display", "Segoe UI Variable", Roboto, sans-serif;
      color: var(--text-light);
      background-color: var(--bg-dark);
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* ─── SYSTEM UTILITIES ─────────────────────────────────── */
    .grain {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.04;
      background-image: radial-gradient(circle at 50% 50%, #fff 0 1px, transparent 1.5px);
      background-size: 120px 120px;
    }

    #wp-btn {
      position: fixed; bottom: 20px; left: 20px; z-index: 100;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; background: rgba(15, 20, 30, 0.7);
      border: 1px solid var(--border-alpha); border-radius: 999px;
      color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 600;
      cursor: pointer; backdrop-filter: blur(8px); transition: var(--transition);
    }
    #wp-btn:hover { background: #fff; color: #000; }
    #wp-input { display: none; }

    /* ─── FIXED DASHBOARD CONTAINER (Comet Style Center) ─────── */
    .dashboard-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 1100px;
      margin: 0 auto;
    }

    header class="dashboard-header" {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 24px; padding: 0 8px;
    }
    #clock-time { font-size: 48px; font-weight: 300; letter-spacing: -1.5px; line-height: 1; }
    #clock-date { font-size: 13px; opacity: 0.5; margin-top: 4px; font-weight: 500; }

    /* ─── BENTO GRID ARCHITECTURE (image_3dca80.jpg) ─────────── */
    .bento-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 20px;
    }

    .left-column { display: flex; flex-direction: column; gap: 20px; }

    /* Modular Block Styles */
    .card {
      border-radius: var(--radius);
      padding: 28px; display: flex; flex-direction: column;
      position: relative; overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: var(--transition);
    }

    .color-block-text {
      color: var(--ink); font-size: 20px; font-weight: 700;
      letter-spacing: -0.5px; line-height: 1.2; margin-top: auto;
    }

    /* Block Variations */
    .block-apps { background-color: var(--card-lavender); min-height: 280px; }
    .block-status { background-color: var(--card-lime); min-height: 220px; }
    
    .block-workspace { 
      background-color: var(--card-blue); 
      grid-column: 2; grid-row: 1 / span 2;
      min-height: 520px; display: flex; flex-direction: column; gap: 24px;
    }

    /* ─── APPLICATION GRID COMPONENTS ─────────────────────── */
    .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .app-link { display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; }
    .app-icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(17, 22, 29, 0.1); transition: var(--transition);
    }
    .app-icon svg { width: 22px; height: 22px; fill: var(--ink); }
    .app-link:hover .app-icon { transform: scale(1.08); background: rgba(17, 22, 29, 0.2); }
    .app-name { font-size: 11px; font-weight: 700; color: var(--ink); text-align: center; width: 100%; opacity: 0.8; }

    /* ─── STATUS COMPONENT ───────────────────────────────── */
    .status-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .status-row { 
      display: flex; justify-content: space-between; align-items: center; 
      background: rgba(255,255,255,0.4); padding: 10px 14px; border-radius: 12px;
    }
    .status-name { font-size: 13px; font-weight: 700; color: var(--ink); }
    .status-badge { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink); }
    .status-badge.online { color: #047857; }
    .status-badge.offline { color: #b91c1c; }
    
    .status-shimmer {
      width: 100%; height: 34px; border-radius: 12px;
      background: linear-gradient(90deg, rgba(255,255,255,0.3) 25%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0.3) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ─── WORKSPACE (GLASS PANELS INSIDE BLUE BLOCK) ──────── */
    .glass-panel {
      background: var(--card-glass); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px; padding: 18px; display: flex; flex-direction: column; gap: 12px;
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; }
    .panel-header h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); }
    
    .btn-action {
      background: rgba(255,255,255,0.1); border: none; padding: 4px 10px; 
      border-radius: 6px; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .btn-action:hover { background: rgba(255,255,255,0.2); }

    /* Notes Configuration */
    .notes-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; }
    .note-tab {
      background: transparent; border: none; color: rgba(255,255,255,0.4);
      padding: 4px 8px; font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 4px;
    }
    .note-tab.active { color: #fff; background: rgba(255,255,255,0.1); }
    .note-textarea {
      width: 100%; min-height: 80px; background: transparent; border: none;
      resize: none; outline: none; color: #fff; font-family: inherit; font-size: 13px; line-height: 1.5;
    }

    /* To-Do Configuration */
    .todo-row { display: flex; gap: 6px; }
    .todo-input {
      flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 6px 12px; color: #fff; font-size: 12px; outline: none;
    }
    .todo-list { max-height: 110px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .todo-item {
      display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.15);
      padding: 8px 12px; border-radius: 8px; font-size: 12px;
    }
    .todo-cb { appearance: none; width: 14px; height: 14px; border: 1px solid rgba(255,255,255,0.4); border-radius: 4px; cursor: pointer; }
    .todo-cb:checked { background: var(--card-lime); border-color: var(--card-lime); }
    .todo-item.done span { text-decoration: line-through; opacity: 0.4; }

    /* Schedule Configuration */
    .event-list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 120px; overflow-y: auto; }
    .event-item { display: flex; justify-content: space-between; font-size: 12px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .ev-info { display: flex; flex-direction: column; }
    .ev-title { font-weight: 700; }
    .ev-when { font-size: 10px; opacity: 0.5; text-transform: uppercase; font-weight: 700; margin-top: 2px; }
    .ev-date { font-weight: 600; opacity: 0.8; }

    /* ─── GLOBAL SCROLLBARS ───────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* ─── RESPONSIVE PIPELINE ─────────────────────────────── */
    @media (max-width: 820px) {
      body { padding: 20px 12px; }
      .bento-grid { grid-template-columns: 1fr; }
      .block-workspace { grid-column: 1; }
    }
  </style>
</head>
<body>
<div class="grain"></div>

<button id="wp-btn" onclick="document.getElementById('wp-input').click()">Customize Interface</button>
<input type="file" id="wp-input" accept="image/*">

<div class="dashboard-container">
  <header class="dashboard-header">
    <div>
      <div id="clock-time">00:00</div>
      <div id="clock-date">Processing Terminal...</div>
    </div>
  </header>

  <main class="bento-grid">
    <div class="left-column">
      
      <!-- APPS BLOCK (Lavender) -->
      <section class="card block-apps">
        <div class="app-grid" id="app-grid">
          <!-- Dynamic Links Injected Here -->
        </div>
        <div class="color-block-text">Connect spaces seamlessly.</div>
      </section>

      <!-- STATUS BLOCK (Lime Neon) -->
      <section class="card block-status">
        <div class="status-list" id="status-list">
          <div class="status-shimmer"></div>
          <div class="status-shimmer"></div>
        </div>
        <div class="color-block-text">System Core</div>
      </section>

    </div>

    <!-- MAIN WORKSPACE BLOCK (Deep Blue) -->
    <div class="card block-workspace">
      
      <!-- Notes Panel Component -->
      <section class="glass-panel">
        <div class="panel-header">
          <h3>Notebook</h3>
          <button class="btn-action" onclick="clearActiveNote()">Clear</button>
        </div>
        <div class="notes-tabs" id="notes-tabs"></div>
        <div id="notes-body"></div>
      </section>

      <!-- To-Do Control Engine -->
      <section class="glass-panel">
        <div class="panel-header">
          <h3>Action Grid</h3>
        </div>
        <div class="todo-row">
          <input class="todo-input" id="todo-input" placeholder="New objective..." onkeydown="if(event.key==='Enter')addTodo()">
          <button class="btn-action" onclick="addTodo()">+</button>
        </div>
        <div class="todo-list" id="todo-list"></div>
      </section>

      <!-- Upcoming Events Agenda Container -->
      <section class="glass-panel">
        <div class="panel-header">
          <h3>Agenda</h3>
        </div>
        <ul class="event-list" id="events-list"></ul>
        <div class="todo-row">
          <input class="todo-input" id="ev-title" placeholder="Event name..." style="flex: 2;">
          <input class="todo-input" id="ev-date" type="date" style="flex: 1.3;">
          <button class="btn-action" onclick="addEvent()">+</button>
        </div>
      </section>

    </div>
  </main>
</div>

function renderApps() {
  document.getElementById('app-grid').innerHTML = APPS.map(a => `
    <a class="app-link" href="${a.url}" target="_blank" rel="noopener">
      <div class="app-icon">${a.icon}</div>
      <span class="app-name">${a.name}</span>
    </a>`).join('');
}

/* ══════════════════════════════════════════════════════════
   CHRONOGRAPHIC ENGINE
══════════════════════════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  document.getElementById('clock-time').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock-date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
}
updateClock(); setInterval(updateClock, 1000);

/* ══════════════════════════════════════════════════════════
   WALLPAPER SUBSYSTEM
══════════════════════════════════════════════════════════ */
(function initWallpaper(){
  const saved = localStorage.getItem('dash-mini-wp');
  if(saved) document.body.style.backgroundImage = `url(${saved})`;
})();
document.getElementById('wp-input').addEventListener('change', function(){
  const file = this.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.body.style.backgroundImage = `url(${e.target.result})`;
    try { localStorage.setItem('dash-mini-wp', e.target.result); } catch(err){}
  };
  reader.readAsDataURL(file);
});

/* ══════════════════════════════════════════════════════════
   INFRASTRUCTURE ARCHITECTURE PERFORMANCE CHECKS
══════════════════════════════════════════════════════════ */
const MICRO_SERVICES = [
  { name:'MongoDB Ecosystem', check: () => new Promise(r => setTimeout(()=>r('online'), 700)) },
  { name:'External Infrastructure', check: () => new Promise(r => setTimeout(()=>r('offline'), 1100)) }
];

async function refreshStatus() {
  const list = document.getElementById('status-list');
  list.innerHTML = `<div class="status-shimmer"></div>`;
  const outcomes = await Promise.allSettled(MICRO_SERVICES.map(s => s.check()));
  list.innerHTML = '';
  MICRO_SERVICES.forEach((s, i) => {
    const status = outcomes[i].status === 'fulfilled' ? outcomes[i].value : 'offline';
    list.innerHTML += `
      <div class="status-row">
        <span class="status-name">${s.name}</span>
        <span class="status-badge ${status}">${status}</span>
      </div>`;
  });
}
setTimeout(refreshStatus, 400);

/* ══════════════════════════════════════════════════════════
   WORKSPACE ACTIONS SYSTEM (MongoDB Drop-in Ready)
══════════════════════════════════════════════════════════ */
let notesData = { tabs: [], active: null };
let todos = [];
let events = [];

/* Note Core Logic */
function loadNotes() {
  try { notesData = JSON.parse(localStorage.getItem('dash-mini-notes')) || { tabs:[], active:null }; } catch { notesData = { tabs:[], active:null }; }
  if(!notesData.tabs.length) {
    notesData.tabs.push({ id: 'n1', title: 'Main Space', content: '' });
    notesData.active = 'n1';
  }
}
function saveNotes() {
  const currentArea = document.querySelector('.note-textarea.active');
  if(currentArea) {
    const activeTab = notesData.tabs.find(t => t.id === notesData.active);
    if(activeTab) activeTab.content = currentArea.value;
  }
  localStorage.setItem('dash-mini-notes', JSON.stringify(notesData));
}
function renderNotes() {
  const tabs = document.getElementById('notes-tabs');
  const body = document.getElementById('notes-body');
  tabs.innerHTML = notesData.tabs.map(t => `<button class="note-tab ${t.id===notesData.active?'active':''}" onclick="switchNote('${t.id}')">${t.title}</button>`).join('') + `<button class="note-tab" onclick="addNoteTab()">+</button>`;
  body.innerHTML = notesData.tabs.map(t => `<textarea class="note-textarea ${t.id===notesData.active?'active':''}" style="display:${t.id===notesData.active?'block':'none'}" oninput="syncNotesData('${t.id}', this.value)" placeholder="Write core documentation notes here...">${t.content||''}</textarea>`).join('');
}
function switchNote(id) { saveNotes(); notesData.active = id; renderNotes(); }
function addNoteTab() {
  const id = 'n' + Date.now();
  notesData.tabs.push({ id, title: `Workspace ${notesData.tabs.length+1}`, content: '' });
  notesData.active = id; saveNotes(); renderNotes();
}
function syncNotesData(id, val) {
  const tab = notesData.tabs.find(t => t.id === id);
  if(tab) tab.content = val;
  localStorage.setItem('dash-mini-notes', JSON.stringify(notesData));
}
function clearActiveNote() {
  const target = document.querySelector('.note-textarea.active');
  if(target && confirm('Clear text?')) { target.value = ''; saveNotes(); }
}

/* To-Do Core Logic */
function loadTodos() { try { todos = JSON.parse(localStorage.getItem('dash-mini-todos')) || []; } catch { todos = []; } }
function renderTodos() {
  const list = document.getElementById('todo-list');
  if(!todos.length) { list.innerHTML = `<div class="empty-state">No Pending Items</div>`; return; }
  list.innerHTML = todos.map(t => `
    <div class="todo-item ${t.done?'done':''}">
      <input type="checkbox" class="todo-cb" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')">
      <span>${escHtml(t.text)}</span>
    </div>`).join('');
}
function addTodo() {
  const el = document.getElementById('todo-input'); const v = el.value.trim(); if(!v) return;
  todos.push({ id: Date.now().toString(), text: v, done: false });
  el.value = ''; localStorage.setItem('dash-mini-todos', JSON.stringify(todos)); renderTodos();
}
function toggleTodo(id) {
  const target = todos.find(t => t.id === id);
  if(target) { target.done = !target.done; localStorage.setItem('dash-mini-todos', JSON.stringify(todos)); renderTodos(); }
}

/* Agenda Pipeline Logic */
function loadEvents() {
  try { events = JSON.parse(localStorage.getItem('dash-mini-events')) || []; } catch { events = []; }
  if(!events.length) {
    const yr = new Date().getFullYear();
    events = [
      { id: '1', title: 'Claude Opus 5 Launch Paradigm', date: `${yr}-07-12` },
      { id: '2', title: 'Infrastructure Milestone Review', date: `${yr}-08-03` }
    ];
  }
}
function calculateRelativeDistance(dateStr) {
  const dayDifference = Math.round((new Date(dateStr + 'T00:00:00').setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);
  if (dayDifference === 0) return "today";
  if (dayDifference === 1) return "tomorrow";
  if (dayDifference > 1 && dayDifference < 7) return `in ${dayDifference} days`;
  return `in ${Math.round(dayDifference / 7)} weeks`;
}
function renderEvents() {
  const el = document.getElementById('events-list');
  if(!events.length) { el.innerHTML = `<div class="empty-state">Timeline Clear</div>`; return; }
  const sorted = [...events].sort((a,b) => new Date(a.date) - new Date(b.date));
  el.innerHTML = sorted.map(ev => `
    <li class="event-item">
      <div class="ev-info">
        <span class="ev-title">${escHtml(ev.title)}</span>
        <span class="ev-when">${calculateRelativeDistance(ev.date)}</span>
      </div>
      <span class="ev-date">${new Date(ev.date + 'T00:00:00').toLocaleDateString([], {day:'numeric', month:'short'})}</span>
    </li>`).join('');
}
function addEvent() {
  const tEl = document.getElementById('ev-title'); const dEl = document.getElementById('ev-date');
  if(!tEl.value.trim() || !dEl.value) return;
  events.push({ id: Date.now().toString(), title: tEl.value.trim(), date: dEl.value });
  tEl.value = ''; localStorage.setItem('dash-mini-events', JSON.stringify(events)); renderEvents();
}

/* Utilities */
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* Runtime Application Ignition */
renderApps();
loadNotes(); renderNotes();
loadTodos(); renderTodos();
loadEvents(); renderEvents();
document.getElementById('ev-date').valueAsDate = new Date();
</script>
</body>
</html>
