<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <style>
    /* ─── RESET & ROOT ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --wp: linear-gradient(135deg, #18222f 0%, #111923 48%, #0b1119 100%);
      --text: #f7f8fa;
      --muted: #aeb7c4;
      --ink: #1e2730;
      --surface: rgba(16, 22, 32, 0.72);
      --surface-strong: rgba(24, 32, 44, 0.92);
      --surface-soft: rgba(240, 244, 249, 0.96);
      --border: rgba(255,255,255,0.12);
      --accent: #4f8ef7;
      --accent2: #a78bfa;
      --success: #34d399;
      --danger: #f87171;
      --warn: #fbbf24;
      --shadow: 0 24px 70px rgba(0,0,0,0.35);
      --radius: 22px;
    }

    html, body { min-height: 100%; }

    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background-image:
        linear-gradient(180deg, rgba(5,8,14,0.45), rgba(5,8,14,0.55)),
        var(--wp);
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      overflow-x: hidden;
      min-width: 320px;
    }

    /* ─── GRAIN OVERLAY ──────────────────────────────────── */
    .grain {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.07;
      background-image:
        radial-gradient(circle at 13% 17%, #fff 0 1px, transparent 1.5px),
        radial-gradient(circle at 71% 29%, #fff 0 1px, transparent 1.3px),
        radial-gradient(circle at 44% 73%, #fff 0 1px, transparent 1.4px),
        radial-gradient(circle at 88% 61%, #fff 0 1px, transparent 1.3px);
      background-size: 107px 91px, 149px 121px, 193px 167px, 131px 143px;
    }

    /* ─── WALLPAPER PICKER ───────────────────────────────── */
    #wp-btn {
      position: fixed; top: 18px; left: 22px; z-index: 100;
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px 7px 10px;
      background: rgba(10,15,24,0.55);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px; color: rgba(255,255,255,0.7);
      font-size: 12px; font-weight: 600; letter-spacing: .5px;
      cursor: pointer; backdrop-filter: blur(12px);
      transition: background .2s, color .2s;
    }
    #wp-btn:hover { background: rgba(79,142,247,0.25); color: #fff; }
    #wp-btn svg { flex-shrink: 0; }
    #wp-input { display: none; }

    /* ─── CLOCK (top-right) ──────────────────────────────── */
    #clock-wrap {
      position: fixed; top: 14px; right: 26px; z-index: 100;
      text-align: right; pointer-events: none;
    }
    #clock-time {
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 200; letter-spacing: -2px;
      color: rgba(255,255,255,0.92);
      line-height: 1;
    }
    #clock-date {
      font-size: 12px; color: rgba(255,255,255,0.5);
      letter-spacing: .5px; margin-top: 2px;
    }

    /* ─── MAIN DASHBOARD ─────────────────────────────────── */
    .dashboard {
      position: relative; z-index: 1;
      width: calc(100% - 48px);
      min-height: calc(100vh - 48px);
      margin: 24px auto;
      padding: 32px 52px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      background: rgba(8,12,20,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      backdrop-filter: blur(3px);
    }

    /* ─── LAYOUT ─────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: minmax(380px, .75fr) minmax(520px, 1fr);
      gap: clamp(32px, 6vw, 100px);
      max-width: 1500px;
      margin: 72px auto 0;
    }

    /* ─── APP PANEL ──────────────────────────────────────── */
    .app-panel {
      display: flex; flex-direction: column; gap: 28px;
      padding: 32px 28px 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.06);
      backdrop-filter: blur(22px);
    }

    .panel-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.8px; text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: -10px;
    }

    /* ─── APP GRID ───────────────────────────────────────── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px 18px;
    }

    .app-link {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      text-decoration: none; color: var(--text);
      cursor: pointer;
    }

    .app-icon {
      width: 100%; aspect-ratio: 1;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25), inset 0 1px 1px rgba(255,255,255,0.15);
      transition: transform 200ms cubic-bezier(.34,1.56,.64,1), box-shadow 200ms;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .app-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
    .app-icon svg { width: 55%; height: 55%; }

    .app-link:hover .app-icon {
      transform: translateY(-5px) scale(1.04);
      box-shadow: 0 14px 32px rgba(0,0,0,0.35), inset 0 1px 1px rgba(255,255,255,0.2);
    }
    .app-link:active .app-icon { transform: translateY(-2px) scale(1.01); }

    .app-name {
      font-size: 11px; font-weight: 600;
      text-align: center; opacity: .82;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      width: 100%;
    }

    /* ─── APP ICON COLORS ────────────────────────────────── */
    .ic-whatsapp  { background: linear-gradient(145deg,#25d366,#128c7e); }
    .ic-instagram { background: linear-gradient(145deg,#f58529,#dd2a7b,#8134af,#515bd4); }
    .ic-snapchat  { background: linear-gradient(145deg,#fffc00,#f5e700); }
    .ic-pinterest { background: linear-gradient(145deg,#e60023,#c8001e); }
    .ic-youtube   { background: linear-gradient(145deg,#ff0000,#cc0000); }
    .ic-reddit    { background: linear-gradient(145deg,#ff4500,#cc3700); }
    .ic-twitter   { background: linear-gradient(145deg,#1da1f2,#0d8bd9); }
    .ic-linkedin  { background: linear-gradient(145deg,#0077b5,#005885); }
    .ic-spotify   { background: linear-gradient(145deg,#1db954,#158a3e); }
    .ic-netflix   { background: linear-gradient(145deg,#e50914,#b0060f); }
    .ic-gmail     { background: linear-gradient(145deg,#ea4335,#c5221f); }
    .ic-drive     { background: linear-gradient(145deg,#4285f4,#0d62d1); }
    .ic-maps      { background: linear-gradient(145deg,#34a853,#1e8a3c); }
    .ic-github    { background: linear-gradient(145deg,#24292e,#0d1117); }
    .ic-twitch    { background: linear-gradient(145deg,#9147ff,#6c35cc); }
    .ic-discord   { background: linear-gradient(145deg,#5865f2,#3c45c5); }

    /* ─── STATUS TABLE ───────────────────────────────────── */
    .status-card {
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(240,244,249,0.95);
      overflow: hidden;
    }
    .status-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 10px 14px;
      background: rgba(220,228,238,0.9);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .status-header-title {
      font-size: 13px; font-weight: 800;
      color: var(--ink); letter-spacing: .3px;
    }
    .status-refresh {
      font-size: 10px; color: #64748b; font-weight: 600;
      background: none; border: none; cursor: pointer;
      padding: 2px 6px; border-radius: 6px;
      transition: background .15s;
    }
    .status-refresh:hover { background: rgba(0,0,0,0.07); }

    .status-list { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 7px; }

    .status-row {
      display: grid; grid-template-columns: 1fr 40px auto;
      gap: 8px; align-items: center;
    }
    .status-name, .status-value {
      min-height: 42px; display: flex; align-items: center;
      border-radius: 9px; background: rgba(255,255,255,0.82);
    }
    .status-name {
      padding: 0 14px; font-size: 13px; font-weight: 700; color: var(--ink);
    }
    .status-dot-wrap {
      width: 40px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 9px;
      border: 1px solid #d1d9e0;
      background: #edf0f4;
    }
    .status-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #cdd5de;
      transition: background .4s;
    }
    .status-dot.online   { background: var(--success); box-shadow: 0 0 0 3px rgba(52,211,153,.22); }
    .status-dot.offline  { background: var(--danger);  box-shadow: 0 0 0 3px rgba(248,113,113,.22); }
    .status-dot.checking { background: var(--warn); animation: pulse 1.1s ease-in-out infinite; }

    /* shimmer loading bar */
    .status-shimmer {
      width: 100%; height: 42px; border-radius: 9px;
      background: linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);
      background-size: 300% 100%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 100% 50%; }
      100% { background-position: -100% 50%; }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }

    .status-value {
      padding: 0 12px; font-size: 12px; font-weight: 700;
      color: var(--ink); min-width: 80px; justify-content: center;
    }
    .status-value.online   { color: #059669; }
    .status-value.offline  { color: #dc2626; }
    .status-value.checking { color: #d97706; }

    /* ─── WORKSPACE ──────────────────────────────────────── */
    .workspace { display: flex; flex-direction: column; gap: 22px; min-width: 0; }

    /* ─── NOTES PANEL ─────────────────────────────────────── */
    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(22px);
    }

    .notes-panel { padding: 0; overflow: hidden; }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .panel-header h2 { font-size: 15px; font-weight: 700; letter-spacing: .2px; }
    .panel-actions { display: flex; gap: 6px; }
    .btn-sm {
      padding: 5px 11px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.75);
      transition: background .15s, color .15s;
    }
    .btn-sm:hover { background: rgba(79,142,247,0.3); color: #fff; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3a7be0; }

    /* Notes tabs */
    .notes-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      overflow-x: auto;
    }
    .note-tab {
      padding: 9px 18px; font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.45); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .note-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .note-tab-add {
      padding: 9px 14px; font-size: 16px; background: none; border: none;
      color: rgba(255,255,255,0.3); cursor: pointer;
      transition: color .15s;
    }
    .note-tab-add:hover { color: var(--accent); }

    .notes-body { position: relative; }
    .note-content {
      display: none; width: 100%; min-height: 200px;
      padding: 16px 18px;
      background: none; border: none; color: var(--text);
      font-size: 14px; line-height: 1.7;
      font-family: inherit; resize: vertical;
      outline: none;
    }
    .note-content.active { display: block; }
    .note-content::placeholder { color: rgba(255,255,255,0.25); }

    /* ─── TODO PANEL ─────────────────────────────────────── */
    .todo-panel { padding: 0; overflow: hidden; }

    .todo-input-row {
      display: flex; gap: 8px; padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .todo-input {
      flex: 1; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 8px 14px;
      color: var(--text); font-size: 13px; font-family: inherit;
      outline: none; transition: border-color .15s, background .15s;
    }
    .todo-input:focus { border-color: var(--accent); background: rgba(79,142,247,0.08); }
    .todo-input::placeholder { color: rgba(255,255,255,0.28); }

    .todo-list { padding: 8px 12px 12px; display: flex; flex-direction: column; gap: 5px; max-height: 260px; overflow-y: auto; }
    .todo-list::-webkit-scrollbar { width: 4px; }
    .todo-list::-webkit-scrollbar-track { background: transparent; }
    .todo-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .todo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      transition: background .15s;
      animation: slideIn .2s ease;
    }
    .todo-item:hover { background: rgba(255,255,255,0.09); }
    @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

    .todo-cb {
      width: 17px; height: 17px; flex-shrink: 0;
      border-radius: 5px; border: 2px solid rgba(255,255,255,0.25);
      appearance: none; cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .todo-cb:checked { background: var(--accent); border-color: var(--accent); }
    .todo-text {
      flex: 1; font-size: 13px; color: rgba(255,255,255,0.87);
      transition: opacity .15s, text-decoration .15s;
    }
    .todo-item.done .todo-text { opacity: .45; text-decoration: line-through; }
    .todo-del {
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: rgba(255,255,255,0.22);
      padding: 0 2px; line-height: 1;
      transition: color .15s;
    }
    .todo-del:hover { color: var(--danger); }

    .todo-tag {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 5px; letter-spacing: .4px;
    }
    .tag-work    { background: rgba(79,142,247,.25); color: #93c5fd; }
    .tag-personal{ background: rgba(167,139,250,.25); color: #c4b5fd; }
    .tag-urgent  { background: rgba(248,113,113,.25); color: #fca5a5; }

    /* ─── UPCOMING / EVENTS PANEL ────────────────────────── */
    .upcoming-panel { padding: 0; overflow: hidden; }

    .events-list { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
    .events-list::-webkit-scrollbar { width: 4px; }
    .events-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .event-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      animation: slideIn .2s ease;
    }
    .event-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .ev-blue   { background: #60a5fa; }
    .ev-purple { background: #a78bfa; }
    .ev-green  { background: var(--success); }
    .ev-orange { background: #fb923c; }
    .ev-red    { background: var(--danger); }

    .event-info { flex: 1; min-width: 0; }
    .event-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-date  { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
    .event-del {
      background: none; border: none; cursor: pointer;
      font-size: 15px; color: rgba(255,255,255,0.2); padding: 0 2px;
      transition: color .15s;
    }
    .event-del:hover { color: var(--danger); }

    .event-input-row {
      display: flex; gap: 8px; padding: 12px 14px;
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
    }
    .event-input {
      flex: 1; min-width: 120px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px; padding: 7px 12px;
      color: var(--text); font-size: 12px; font-family: inherit;
      outline: none; transition: border-color .15s;
    }
    .event-input:focus { border-color: var(--accent); }
    .event-input::placeholder { color: rgba(255,255,255,0.25); }

    /* ─── EMPTY STATE ─────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 28px 16px;
      color: rgba(255,255,255,0.28); font-size: 13px;
    }
    .empty-state .empty-icon { font-size: 28px; margin-bottom: 6px; }

    /* ─── SCROLLBAR (global) ─────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 3px; }

    /* ─── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 1200px) {
      .layout { grid-template-columns: minmax(340px,.8fr) minmax(440px,1fr); gap: 32px; }
      .dashboard { padding: 28px 36px; }
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; margin-top: 56px; }
      .dashboard { width: calc(100% - 24px); margin: 12px auto; padding: 22px 18px; }
      #clock-wrap { position: relative; top: auto; right: auto; text-align: center; padding: 8px 0 0; }
      #clock-time { font-size: 44px; }
      .app-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 540px) {
      .app-grid { grid-template-columns: repeat(4, 1fr); gap: 14px 10px; }
      .dashboard { padding: 16px 12px; }
      .app-name { font-size: 10px; }
    }
  </style>
</head>
<body>
<div class="grain"></div>

<!-- Wallpaper button -->
<button id="wp-btn" onclick="document.getElementById('wp-input').click()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
  Wallpaper
</button>
<input type="file" id="wp-input" accept="image/*">

<!-- Clock -->
<div id="clock-wrap">
  <div id="clock-time">00:00</div>
  <div id="clock-date"></div>
</div>

<main class="dashboard">
  <div class="layout">

    <!-- ══ LEFT COLUMN ══════════════════════════════════════ -->
    <section class="app-panel">
      <div class="panel-title">Apps</div>

      <div class="app-grid" id="app-grid">
        <!-- injected by JS -->
      </div>

      <!-- Status Table -->
      <div class="status-card">
        <div class="status-header">
          <div class="status-header-title">Service Status</div>
          <button class="status-refresh" onclick="refreshStatus()">↻ Refresh</button>
        </div>
        <div class="status-list" id="status-list">
          <!-- shimmer placeholders -->
          <div class="status-row"><div class="status-shimmer" style="grid-column:1/-1"></div></div>
          <div class="status-row"><div class="status-shimmer" style="grid-column:1/-1"></div></div>
          <div class="status-row"><div class="status-shimmer" style="grid-column:1/-1"></div></div>
          <div class="status-row"><div class="status-shimmer" style="grid-column:1/-1"></div></div>
        </div>
      </div>
    </section>

    <!-- ══ RIGHT COLUMN ═════════════════════════════════════ -->
    <section class="workspace">

      <!-- Notes Panel -->
      <section class="panel notes-panel">
        <div class="panel-header">
          <h2>📝 Notes</h2>
          <div class="panel-actions">
            <button class="btn-sm btn-primary" onclick="saveNotes()">Save</button>
            <button class="btn-sm" onclick="clearActiveNote()">Clear</button>
          </div>
        </div>
        <div class="notes-tabs" id="notes-tabs">
          <!-- injected -->
        </div>
        <div class="notes-body" id="notes-body">
          <!-- injected -->
        </div>
      </section>

      <!-- Todo Panel -->
      <section class="panel todo-panel">
        <div class="panel-header">
          <h2>✅ To-Do</h2>
          <div class="panel-actions">
            <button class="btn-sm" onclick="clearDone()">Clear Done</button>
          </div>
        </div>
        <div class="todo-input-row">
          <input class="todo-input" id="todo-input" placeholder="Add a task… press Enter" onkeydown="if(event.key==='Enter')addTodo()">
          <select id="todo-tag" class="todo-input" style="flex:0 0 auto;width:auto;padding:8px 10px;cursor:pointer;">
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="urgent">Urgent</option>
          </select>
          <button class="btn-sm btn-primary" onclick="addTodo()">Add</button>
        </div>
        <div class="todo-list" id="todo-list"></div>
      </section>

      <!-- Upcoming / Events Panel -->
      <section class="panel upcoming-panel">
        <div class="panel-header">
          <h2>📅 Upcoming</h2>
          <div class="panel-actions">
            <button class="btn-sm" onclick="clearPastEvents()">Clear Past</button>
          </div>
        </div>
        <div class="events-list" id="events-list"></div>
        <div class="event-input-row">
          <input class="event-input" id="ev-title" placeholder="Event title…" style="flex:2">

/* ══════════════════════════════════════════════════════════
   CLOCK
══════════════════════════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${h}:${m}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock-date').textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
}
updateClock();
setInterval(updateClock, 1000);

/* ══════════════════════════════════════════════════════════
   WALLPAPER
══════════════════════════════════════════════════════════ */
(function initWallpaper(){
  const saved = localStorage.getItem('dash-wallpaper');
  if(saved) document.body.style.backgroundImage =
    `linear-gradient(180deg,rgba(5,8,14,.45),rgba(5,8,14,.55)),url(${saved})`;
})();
document.getElementById('wp-input').addEventListener('change', function(){
  const file = this.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const url = e.target.result;
    document.body.style.backgroundImage =
      `linear-gradient(180deg,rgba(5,8,14,.45),rgba(5,8,14,.55)),url(${url})`;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
    try { localStorage.setItem('dash-wallpaper', url); } catch(e2){}
  };
  reader.readAsDataURL(file);
});

/* ══════════════════════════════════════════════════════════
   STATUS TABLE  (simulated – swap fetch() calls for real endpoints)
══════════════════════════════════════════════════════════ */
const SERVICES = [
  { name:'MongoDB',   key:'mongo',   checkFn: simulateCheck(800,  0.9) },
  { name:'Stocks API',key:'stocks',  checkFn: simulateCheck(1200, 0.6) },
  { name:'News API',  key:'news',    checkFn: simulateCheck(600,  0.85) },
  { name:'Network',   key:'network', checkFn: checkNetwork },
];

function simulateCheck(delay, upProb) {
  return () => new Promise(r => setTimeout(()=>r(Math.random() < upProb ? 'online' : 'offline'), delay));
}
function checkNetwork() {
  return Promise.resolve(navigator.onLine ? 'online' : 'offline');
}

async function refreshStatus() {
  const list = document.getElementById('status-list');
  // show shimmer
  list.innerHTML = SERVICES.map(()=>`
    <div class="status-row"><div class="status-shimmer" style="grid-column:1/-1;height:42px;border-radius:9px"></div></div>`).join('');

  // run checks in parallel
  const results = await Promise.allSettled(SERVICES.map(s => s.checkFn()));

  list.innerHTML = '';
  SERVICES.forEach((s, i) => {
    const state = results[i].status === 'fulfilled' ? results[i].value : 'offline';
    const labels = { online:'Online', offline:'Offline', checking:'Checking…' };
    list.innerHTML += `
      <div class="status-row">
        <div class="status-name">${s.name}</div>
        <div class="status-dot-wrap"><div class="status-dot ${state}"></div></div>
        <div class="status-value ${state}">${labels[state]||state}</div>
      </div>`;
  });
}
// Run on load with a small delay so shimmer is visible
setTimeout(refreshStatus, 600);

/* ══════════════════════════════════════════════════════════
   NOTES  (localStorage – MongoDB-ready: swap save/load fns)
══════════════════════════════════════════════════════════ */
/*
  MIGRATION NOTE:
  Replace loadNotes() / saveNotes() with fetch('/api/notes', {...}) calls.
  The data shape is: { tabs:[{id,title,content}], active:id }
*/
let notesData = { tabs: [], active: null };

function loadNotes() {
  try { notesData = JSON.parse(localStorage.getItem('dash-notes-v2')) || { tabs:[], active:null }; }
  catch { notesData = { tabs:[], active:null }; }
  if(!notesData.tabs.length) {
    notesData.tabs.push({ id: 'n1', title: 'Note 1', content: '' });
    notesData.active = 'n1';
  }
}

function saveNotes() {
  // collect current textarea value
  const ta = document.querySelector('.note-content.active');
  if(ta) {
    const tab = notesData.tabs.find(t=>t.id===notesData.active);
    if(tab) tab.content = ta.value;
  }
  try { localStorage.setItem('dash-notes-v2', JSON.stringify(notesData)); } catch{}
  showToast('Notes saved ✓');
}

function renderNotes() {
  const tabsEl = document.getElementById('notes-tabs');
  const bodyEl = document.getElementById('notes-body');
  tabsEl.innerHTML = notesData.tabs.map(t => `
    <button class="note-tab ${t.id===notesData.active?'active':''}"
      onclick="switchNote('${t.id}')"
      ondblclick="renameNote('${t.id}')">${t.title}</button>
  `).join('') + `<button class="note-tab-add" onclick="addNoteTab()" title="New tab">+</button>`;

  bodyEl.innerHTML = notesData.tabs.map(t => `
    <textarea class="note-content ${t.id===notesData.active?'active':''}"
      id="note-${t.id}"
      placeholder="Start writing…"
      oninput="autoSaveNote('${t.id}', this.value)">${t.content||''}</textarea>
  `).join('');
}

function switchNote(id) {
  saveNotes();
  notesData.active = id;
  renderNotes();
}

function addNoteTab() {
  const id = 'n' + Date.now();
  notesData.tabs.push({ id, title: `Note ${notesData.tabs.length+1}`, content: '' });
  notesData.active = id;
  renderNotes();
  saveNotes();
}

function renameNote(id) {
  const tab = notesData.tabs.find(t=>t.id===id);
  if(!tab) return;
  const name = prompt('Rename note:', tab.title);
  if(name && name.trim()) { tab.title = name.trim(); renderNotes(); saveNotes(); }
}

function clearActiveNote() {
  const ta = document.querySelector('.note-content.active');
  if(ta && confirm('Clear this note?')) { ta.value=''; }
}

let autoSaveTimer;
function autoSaveNote(id, val) {
  const tab = notesData.tabs.find(t=>t.id===id);
  if(tab) tab.content = val;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    try { localStorage.setItem('dash-notes-v2', JSON.stringify(notesData)); } catch{}
  }, 800);
}

/* ══════════════════════════════════════════════════════════
   TODO  (localStorage – MongoDB-ready)
══════════════════════════════════════════════════════════ */
/*
  MIGRATION NOTE:
  Replace loadTodos() / saveTodos() with fetch('/api/todos', {...}).
  Data shape: [{id, text, tag, done, createdAt}]
*/
let todos = [];

function loadTodos() {
  try { todos = JSON.parse(localStorage.getItem('dash-todos-v2')) || []; }
  catch { todos = []; }
}

function saveTodos() {
  try { localStorage.setItem('dash-todos-v2', JSON.stringify(todos)); } catch{}
}

function renderTodos() {
  const list = document.getElementById('todo-list');
  if(!todos.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>No tasks yet. Add one above.</div>`;
    return;
  }
  list.innerHTML = todos.map(t => `
    <div class="todo-item ${t.done?'done':''}" id="ti-${t.id}">
      <input type="checkbox" class="todo-cb" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')">
      <span class="todo-text">${escHtml(t.text)}</span>
      <span class="todo-tag tag-${t.tag}">${t.tag}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}')" title="Delete">×</button>
    </div>`).join('');
}

function addTodo() {
  const input = document.getElementById('todo-input');
  const text = input.value.trim();
  if(!text) return;
  const tag = document.getElementById('todo-tag').value;
  todos.push({ id: Date.now().toString(), text, tag, done: false, createdAt: new Date().toISOString() });
  input.value = '';
  saveTodos(); renderTodos();
}

function toggleTodo(id) {
  const t = todos.find(x=>x.id===id);
  if(t) { t.done = !t.done; saveTodos(); renderTodos(); }
}

function deleteTodo(id) {
  todos = todos.filter(x=>x.id!==id); saveTodos(); renderTodos();
}

function clearDone() {
  todos = todos.filter(x=>!x.done); saveTodos(); renderTodos();
}

/* ══════════════════════════════════════════════════════════
   EVENTS / UPCOMING  (localStorage – Calendar-ready)
══════════════════════════════════════════════════════════ */
/*
  MIGRATION NOTE:
  Replace loadEvents() / saveEvents() with Google Calendar API or MongoDB fetch.
  Data shape: [{id, title, date, color}]
*/
const EV_COLORS = ['ev-blue','ev-purple','ev-green','ev-orange','ev-red'];
let events = [];

function loadEvents() {
  try { events = JSON.parse(localStorage.getItem('dash-events-v2')); }
  catch { events = null; }

  if(!events || !events.length) {
    events = [
      { id:'e1', title:'Claude Opus 5 release',               date:'2025-07-12', color:'ev-blue' },
      { id:'e2', title:'Gemini Pro subscription cancellation', date:'2025-07-26', color:'ev-orange' },
      { id:'e3', title:'Joining letter',                       date:'2025-08-03', color:'ev-green' },
      { id:'e4', title:'Shaik Birthday 🎂',                    date:'2025-10-02', color:'ev-purple' },
    ];
  }
}

function saveEvents() {
  try { localStorage.setItem('dash-events-v2', JSON.stringify(events)); } catch{}
}

function renderEvents() {
  const list = document.getElementById('events-list');
  if(!events.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div>No upcoming events.</div>`;
    return;
  }
  const sorted = [...events].sort((a,b)=>new Date(a.date)-new Date(b.date));
  list.innerHTML = sorted.map(ev => {
    const d = new Date(ev.date + 'T00:00:00');
    const label = d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    const isPast = d < new Date() && d.toDateString() !== new Date().toDateString();
    return `<div class="event-item" id="ev-${ev.id}" style="${isPast?'opacity:.5':''}">
      <div class="event-dot ${ev.color}"></div>
      <div class="event-info">
        <div class="event-title">${escHtml(ev.title)}</div>
        <div class="event-date">${label}${isPast?' · Past':''}</div>
      </div>
      <button class="event-del" onclick="deleteEvent('${ev.id}')" title="Remove">×</button>
    </div>`;
  }).join('');
}

function addEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const date  = document.getElementById('ev-date').value;
  if(!title || !date) { showToast('Enter title and date'); return; }
  const color = EV_COLORS[events.length % EV_COLORS.length];
  events.push({ id: Date.now().toString(), title, date, color });
  document.getElementById('ev-title').value = '';
  document.getElementById('ev-date').value = '';
  saveEvents(); renderEvents();
}

function deleteEvent(id) {
  events = events.filter(x=>x.id!==id); saveEvents(); renderEvents();
}

function clearPastEvents() {
  const today = new Date(); today.setHours(0,0,0,0);
  events = events.filter(x => new Date(x.date+'T00:00:00') >= today);
  saveEvents(); renderEvents();
}

/* ══════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if(!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(20,28,40,.95);color:#f7f8fa;padding:9px 20px;border-radius:999px;font-size:13px;font-weight:600;z-index:999;border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px);transition:opacity .3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.opacity='0'; }, 2000);
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
renderApps();
loadNotes(); renderNotes();
loadTodos(); renderTodos();
loadEvents(); renderEvents();

// Set default date to today
document.getElementById('ev-date').valueAsDate = new Date();
</script>
